name: Scrape TOTO Results

on:
  schedule:
    # TOTO draws on Monday and Thursday evenings (SGT = UTC+8).
    # Run at 11 PM SGT Tuesday and Friday (15:00 UTC) to give results time to post.
    - cron: "0 15 * * 2"   # Tuesday 11 PM SGT
    - cron: "0 15 * * 5"   # Friday 11 PM SGT
  workflow_dispatch:
    inputs:
      full_backfill:
        description: "Set to 'true' to force re-scrape from the earliest draw"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hours — enough for a full historical backfill (~4000 draws at 1/s)

    steps:
      - name: Checkout repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11"

      - name: Pull latest data before scraping
        run: git pull --ff-only origin main || git pull --rebase origin main

      - name: Clear data for full backfill
        if: ${{ github.event.inputs.full_backfill == 'true' }}
        run: |
          echo "Full backfill requested — clearing existing data"
          rm -f data/toto_results.csv

      - name: Run scraper
        run: python scraper.py

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/toto_results.csv
          if git diff --cached --quiet; then
            echo "No new draws — nothing to commit."
          else
            NEW_ROWS=$(git diff --cached -- data/toto_results.csv | grep -c '^+[^+]' || true)
            git commit -m "chore: add ${NEW_ROWS} TOTO draw result(s) [skip ci]"
            git push
          fi
